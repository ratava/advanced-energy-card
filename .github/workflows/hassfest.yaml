name: Validate Hassfest

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate:
    permissions:
      contents: read
      pull-requests: write
      
    runs-on: ubuntu-latest
    name: Validate plugin
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate HACS
        uses: hacs/action@main
        with:
          category: plugin